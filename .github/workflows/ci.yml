name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest tests/ -x

      - name: Generate sample Excel
        run: python tools/gen_sample.py

      - name: Verify sample Excel readable
        run: |
          python -c "from openpyxl import load_workbook; wb = load_workbook('examples/sample_module.xlsx'); assert 'uart_rx' in wb.sheetnames"
